services:
 postgres_container:
  image: postgres
  container_name: postgres_container
  restart: always
  environment:
   POSTGRES_USER: ${POSTGRES_USER}
   POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
   POSTGRES_DB: ${POSTGRES_DB}
  ports:
   - "5433:5432"
  volumes:
   - ./Postgres/:/docker-entrypoint-initdb.d   # For executing SQL scripts on init
   - db_data:/var/lib/postgresql/data
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 30s

 flask_container:
  build: Flask/. 
  volumes:
    - ./Flask/:/app
  container_name: flask_container
  restart: always
  environment:
   POSTGRES_USER: ${POSTGRES_USER}
   POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
   POSTGRES_DB: ${POSTGRES_DB}
  depends_on:
    postgres_container:
      condition: service_healthy
  ports:
    - "5000:5000"  

 adminer:
  image: adminer
  ports:
   - "8080:8080"

volumes:
 db_data:
  
